<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete React Learning</title>
  </head>
  <body>
    <div id="root">
      <h1>Welcome to React!</h1>
    </div>
    <script>
      const heading = document.createElement("h2");
      heading.textContent = "This is a React application";
      document.getElementById("root").appendChild(heading);
    </script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script>
      const rootElement = document.getElementById("root");
      // this will get overridden by ReactDOM.render() and ReactDOM.createRoot().render()
      const heading3 = React.createElement(
        "h3",
        null,
        "This is created using React!",
      );
      ReactDOM.render(heading3, rootElement);
      const root = ReactDOM.createRoot(rootElement);
      const heading4 = React.createElement(
        "h4",
        null,
        "This is created using React 18!",
      );
      root.render(heading4);
    </script>
  </body>
</html>
